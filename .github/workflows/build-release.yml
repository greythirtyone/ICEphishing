name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows
            arch: x64
            runner: windows-latest
            build-script: dist:win:x64
            artifact-pattern: 'dist/*.exe'
          
          # Linux x64
          - os: linux
            arch: x64
            runner: ubuntu-latest
            build-script: dist:linux:x64
            artifact-pattern: 'dist/*.{AppImage,tar.gz}'
          
          # macOS x64
          - os: darwin
            arch: x64
            runner: macos-latest
            build-script: dist:mac:x64
            artifact-pattern: 'dist/*.{dmg,zip}'
          
          # macOS arm64
          - os: darwin
            arch: arm64
            runner: macos-latest
            build-script: dist:mac:arm64
            artifact-pattern: 'dist/*.{dmg,zip}'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build ${{ matrix.os }} ${{ matrix.arch }}
        run: npm run ${{ matrix.build-script }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: icephisher-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/**/*
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display structure of downloaded files
        run: ls -R artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
