<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICEphisher</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <header class="topbar">
      <span class="topbar-brand">🧊 ICEphisher</span>
      <div class="topbar-right">
        <div class="topbar-group">
          <span class="topbar-label">Newer Than</span>
          <input id="newer-than-date" type="date" class="topbar-input" />
          <button id="clear-date-btn" class="topbar-icon-btn" type="button" title="Clear date filter">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
        <div class="topbar-sep"></div>
        <div class="topbar-group">
          <button id="auto-refresh-toggle-btn" class="topbar-icon-btn topbar-refresh-btn" type="button" title="Enable auto-refresh">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
          </button>
          <select id="auto-refresh-interval" class="topbar-select">
            <option value="60">1 min</option>
            <option value="300">5 min</option>
            <option value="900">15 min</option>
            <option value="1800">30 min</option>
          </select>
        </div>
        <div class="topbar-sep"></div>
        <div class="topbar-group">
          <button id="connect-btn" class="topbar-action-btn" type="button">Connect</button>
          <button id="pull-data-btn" class="topbar-action-btn topbar-action-primary" type="button" style="display:none">Pull Data</button>
        </div>
      </div>
    </header>

    <main class="container">

      <details class="card settings-collapsible">
        <summary class="settings-summary">Connection Settings</summary>
        <form id="settings-form" class="settings-grid">
          <label>
            Kismet Host/IP
            <input id="kismet-host" type="text" placeholder="192.168.1.50:2501" required />
          </label>

          <label>
            Kismet Username
            <input id="kismet-user" type="text" placeholder="kismet" required />
          </label>

          <label>
            Kismet Password
            <input id="kismet-pass" type="password" placeholder="••••••••" required />
          </label>

          <label>
            Kismet Device Endpoint
            <input id="kismet-event-endpoint" type="text" value="/devices/views/all/devices.json" required />
          </label>

          <label>
            WiGLE Auth (Basic token OR username:token)
            <input id="wigle-key" type="password" placeholder="Optional" />
          </label>

        </form>
      </details>

      <section class="status-row">
        <div id="status" class="status">Idle</div>
        <div id="cache-stats" class="cache-stats">Cache: n/a</div>
        <button id="enrich-location-btn" type="button" class="secondary-btn">Enrich Location</button>
        <button id="reset-history-btn" type="button" class="secondary-btn">Reset History</button>
        <button id="export-csv-btn" type="button" class="secondary-btn" disabled>Export CSV</button>
      </section>
      <section id="endpoint-warning" class="status warn" style="display: none"></section>

      <section id="raw-preview-section" class="card">
        <details>
          <summary>Raw Event Preview (<span id="raw-preview-meta">n/a</span>)</summary>
          <pre id="raw-preview">No data yet. Click Pull Data.</pre>
        </details>
      </section>

      <section class="summary-grid">
        <article class="metric card">
          <h2>Total SSIDs</h2>
          <p id="metric-total-ssids">0</p>
        </article>
        <article class="metric card">
          <h2>Duplicate SSIDs<br />(multiple devices)</h2>
          <p id="metric-duplicates">0</p>
        </article>
        <article class="metric card">
          <h2>Total States</h2>
          <p id="metric-states">0</p>
        </article>
      </section>

      <section class="card table-wrap">
        <div class="table-toolbar">
          <input id="ssid-filter" type="search" placeholder="Filter SSIDs, addresses, cities…" autocomplete="off" />
          <span id="filter-count" class="filter-count"></span>
        </div>
        <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th><button class="th-btn" data-sort="ssid" type="button">SSID</button></th>
              <th><button class="th-btn" data-sort="totalProbes" type="button">Total Advertisements</button></th>
              <th><button class="th-btn" data-sort="uniqueDeviceCount" type="button">Unique Devices</button></th>
              <th>Devices (MACs)</th>
              <th><button class="th-btn" data-sort="firstSeen" type="button">First Seen</button></th>
              <th><button class="th-btn" data-sort="lastSeen" type="button">Last Seen</button></th>
              <th><button class="th-btn" data-sort="signalDbm" type="button">Signal (dBm)</button></th>
              <th><button class="th-btn" data-sort="address" type="button">Most Likely Address</button></th>
              <th><button class="th-btn" data-sort="city" type="button">Most Likely City</button></th>
              <th><button class="th-btn" data-sort="state" type="button">Most Likely State</button></th>
              <th><button class="th-btn" data-sort="lat" type="button">Lat / Long</button></th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
